<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARC3 Viewer</title>
  <style>
    :root {
      --paper: #f5f1e8;
      --panel: #fffaf1;
      --ink: #18242d;
      --muted: #6f7f88;
      --line: #d8cdbb;
      --accent: #c55d1f;
      --accent-soft: #f7dcc6;
      --tool: #eaf3ff;
      --reasoning: #edf6e5;
      --shadow: 0 18px 45px rgba(24, 36, 45, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, #fff4dc 0, transparent 32rem),
        linear-gradient(180deg, #f7f2e8 0%, #f0e9dc 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    body {
      padding: 12px;
      overflow: hidden;
    }

    .shell {
      max-width: 1880px;
      height: calc(100vh - 24px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(197, 93, 31, 0.16);
      border-radius: var(--radius);
      background: rgba(255, 250, 241, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .title-wrap h1 {
      margin: 0 0 4px;
      font-size: clamp(1.3rem, 2vw, 1.9rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select,
    button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 9px 14px;
      font: inherit;
    }

    button {
      cursor: pointer;
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(560px, 2fr) 220px minmax(320px, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .panel {
      border-radius: var(--radius);
      border: 1px solid rgba(24, 36, 45, 0.08);
      background: rgba(255, 250, 241, 0.95);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .events-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .levels-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(24, 36, 45, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.94rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .event-count {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .level-count {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .events-list {
      overflow: auto;
      overflow-anchor: none;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .levels-list {
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .level-button {
      width: 100%;
      border: 1px solid rgba(24, 36, 45, 0.08);
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px 12px;
      text-align: left;
      color: var(--ink);
      display: grid;
      gap: 4px;
      cursor: pointer;
    }

    .level-button:hover {
      border-color: rgba(197, 93, 31, 0.35);
    }

    .level-button.active {
      border-color: var(--accent);
      background: rgba(197, 93, 31, 0.08);
      box-shadow: 0 10px 24px rgba(197, 93, 31, 0.12);
    }

    .level-title {
      font-size: 0.92rem;
      font-weight: 700;
    }

    .level-meta {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .event-card {
      border: 1px solid rgba(24, 36, 45, 0.08);
      border-radius: 16px;
      background: #fffdf8;
      padding: 14px;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      cursor: pointer;
    }

    .event-card:hover {
      transform: translateY(-1px);
      border-color: rgba(197, 93, 31, 0.4);
    }

    .event-card.active {
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(197, 93, 31, 0.15);
    }

    .event-card.preview {
      border-color: rgba(197, 93, 31, 0.55);
      box-shadow: 0 8px 24px rgba(197, 93, 31, 0.12);
    }

    .event-card.collapsed {
      padding-bottom: 12px;
    }

    .event-card.collapsed .context-stack {
      display: none;
    }

    .event-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .event-card-header {
      display: block;
    }

    .event-meta {
      margin: -4px 0 10px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    .event-hint {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .context-stack {
      display: grid;
      gap: 8px;
    }

    .section-card {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(24, 36, 45, 0.06);
      background: #fff;
    }

    .section-card.reasoning {
      background: linear-gradient(180deg, #f3faed, #edf7e4);
    }

    .section-card.tool {
      background: linear-gradient(180deg, #f0f8ff, #e8f3ff);
    }

    .section-card.not-in-context {
      opacity: 0.78;
      border-style: dashed;
    }

    .section-label {
      padding: 8px 10px;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(24, 36, 45, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .section-summary {
      cursor: pointer;
      list-style: none;
    }

    .section-summary::-webkit-details-marker {
      display: none;
    }

    .section-summary::after {
      content: "Show";
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    details[open] > .section-summary::after {
      content: "Hide";
    }

    .section-state {
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-card pre {
      margin: 0;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      font-size: 0.82rem;
      line-height: 1.42;
    }

    .prompt-content {
      margin: 0;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      font-size: 0.82rem;
      line-height: 1.42;
    }

    .prompt-line {
      display: block;
      margin: 0 -2px;
      padding: 0 2px;
      border-radius: 4px;
    }

    .prompt-line.changed {
      background: #ffe7a8;
      box-shadow: inset 0 0 0 1px rgba(197, 93, 31, 0.12);
    }

    .context-empty {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(24, 36, 45, 0.04);
      color: var(--muted);
      font-size: 0.86rem;
    }

    .context-note {
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(197, 93, 31, 0.08);
      color: #8b4a1b;
      font-size: 0.76rem;
      line-height: 1.4;
    }

    .section-change-note {
      padding: 8px 10px 0;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.4;
    }

    .section-legend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: #ffe7a8;
      box-shadow: inset 0 0 0 1px rgba(197, 93, 31, 0.12);
      flex: 0 0 auto;
    }

    .board-panel {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      overflow: auto;
    }

    .board-summary {
      display: grid;
      gap: 10px;
    }

    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .summary-header h2 {
      margin: 0 0 3px;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .summary-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .summary-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .summary-link:hover {
      text-decoration: underline;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .summary-item {
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(24, 36, 45, 0.04);
      min-width: 0;
    }

    .summary-item strong {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .summary-item span {
      display: block;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-usage-block {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(24, 36, 45, 0.04);
    }

    .tool-usage-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .tool-usage-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .tool-usage-total {
      font-size: 0.86rem;
      color: var(--ink);
      font-weight: 600;
    }

    .tool-usage-list {
      display: grid;
      gap: 6px;
    }

    .tool-usage-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      font-size: 0.88rem;
    }

    .tool-usage-rank {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .tool-usage-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    .tool-usage-count {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .board-detail-scroll {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .board-wrap {
      min-height: min(60vh, 520px);
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(24, 36, 45, 0.03);
      padding: 8px;
      overflow: hidden;
    }

    .runtime-usage-wrap:empty {
      display: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .ascii-board {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 14px;
      border-radius: 0;
      color: var(--ink);
      background: #ffffff;
      line-height: 1;
      font-size: clamp(5px, 0.8vw, 10px);
      white-space: pre;
      margin: 0;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    .empty-state {
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .shell {
        height: auto;
        min-height: calc(100vh - 24px);
      }

      .content {
        grid-template-columns: 1fr;
      }

      .board-panel {
        min-height: 60vh;
      }

      .board-wrap {
        min-height: 420px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title-wrap">
        <h1>ARC3 Run Viewer</h1>
        <div class="subtitle" id="run-subtitle">Loading latest run...</div>
      </div>
      <div class="controls">
        <select id="run-select" aria-label="Run selector"></select>
        <select id="game-select" aria-label="Game selector"></select>
        <button id="reload-button" type="button">Reload</button>
      </div>
    </div>

    <div class="content">
      <section class="panel events-panel">
        <div class="panel-head">
          <h2>Agent Context</h2>
          <div class="event-count" id="event-count"></div>
        </div>
        <div class="events-list" id="events-list"></div>
      </section>

      <aside class="panel levels-panel">
        <div class="panel-head">
          <h2>Levels</h2>
          <div class="level-count" id="level-count"></div>
        </div>
        <div class="levels-list" id="levels-list"></div>
      </aside>

      <aside class="panel board-panel">
        <div class="board-summary" id="board-summary"></div>
        <div class="board-detail-scroll">
          <div class="board-wrap">
            <canvas id="board-canvas"></canvas>
            <pre id="ascii-board" class="ascii-board" hidden></pre>
          </div>
          <div class="runtime-usage-wrap" id="runtime-usage"></div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const DEFAULT_ARC_PALETTE = [
      "rgb(255, 255, 255)", "rgb(204, 204, 204)", "rgb(153, 153, 153)", "rgb(102, 102, 102)",
      "rgb(51, 51, 51)", "rgb(0, 0, 0)", "rgb(229, 58, 163)", "rgb(255, 123, 204)",
      "rgb(249, 60, 49)", "rgb(30, 147, 255)", "rgb(136, 216, 241)", "rgb(255, 220, 0)",
      "rgb(255, 133, 27)", "rgb(146, 18, 49)", "rgb(79, 204, 48)", "rgb(163, 86, 214)"
    ];

    let payload = null;
    let currentRunName = null;
    let currentGameIndex = 0;
    let currentSteps = [];
    let activeStepIndex = 0;
    let isLoadingPayload = false;
    let currentGameSignature = null;
    let currentGameLoadToken = 0;
    let currentViewerVersion = null;
    let pendingScrollSync = false;
    let currentScrollStepIndex = null;
    let expandedStepIndex = null;
    let hoveredStepIndex = null;

    const runSubtitleEl = document.getElementById("run-subtitle");
    const runSelectEl = document.getElementById("run-select");
    const gameSelectEl = document.getElementById("game-select");
    const eventsListEl = document.getElementById("events-list");
    const eventCountEl = document.getElementById("event-count");
    const levelsListEl = document.getElementById("levels-list");
    const levelCountEl = document.getElementById("level-count");
    const boardSummaryEl = document.getElementById("board-summary");
    const canvasEl = document.getElementById("board-canvas");
    const asciiBoardEl = document.getElementById("ascii-board");
    const runtimeUsageEl = document.getElementById("runtime-usage");

    document.getElementById("reload-button").addEventListener("click", () => {
      loadPayload(currentRunName, { preserveSelection: true, silent: false });
    });
    runSelectEl.addEventListener("change", () => {
      currentRunName = runSelectEl.value || null;
      currentGameIndex = 0;
      loadPayload(currentRunName, { preserveSelection: false, silent: false });
    });
    gameSelectEl.addEventListener("change", () => {
      currentGameIndex = Number(gameSelectEl.value || 0);
      loadGameDetails(currentGameIndex, {
        preserveSelection: false,
        previousActiveStepIndex: activeStepIndex,
        silent: false,
      });
    });
    eventsListEl.addEventListener("click", async (event) => {
      const card = event.target.closest(".event-card");
      if (!card || !eventsListEl.contains(card)) {
        return;
      }
      const index = Number(card.dataset.index);
      const clickedHeader = Boolean(event.target.closest(".event-card-header"));
      if (clickedHeader) {
        updateExpandedStep(index);
      }
      updateActiveStep(index);
      if (clickedHeader) {
        await loadStepDetails(index);
        scrollStepCardToStart(index);
      }
    });
    eventsListEl.addEventListener("mousemove", (event) => {
      const card = event.target.closest(".event-card");
      if (!card || !eventsListEl.contains(card)) {
        return;
      }
      updateHoveredStep(Number(card.dataset.index));
    });
    eventsListEl.addEventListener("mouseleave", () => {
      updateHoveredStep(null);
    });
    eventsListEl.addEventListener("scroll", () => {
      if (pendingScrollSync) {
        return;
      }
      pendingScrollSync = true;
      window.requestAnimationFrame(() => {
        pendingScrollSync = false;
        syncActiveStepToScroll();
      });
    }, { passive: true });
    levelsListEl.addEventListener("click", (event) => {
      const button = event.target.closest(".level-button");
      if (!button || !levelsListEl.contains(button)) {
        return;
      }
      const index = Number(button.dataset.stepIndex);
      updateActiveStep(index);
      scrollStepCardToStart(index);
    });
    window.addEventListener("resize", () => {
      const step = currentSteps[getDisplayedStepIndex()];
      if (step) {
        renderBoard(step.boardEvent || step.event);
      }
    });

    async function pollViewerVersion() {
      try {
        const response = await fetch("/api/viewer-version", { cache: "no-store" });
        if (!response.ok) {
          return;
        }
        const payload = await response.json();
        const nextVersion = Number(payload.version || 0);
        if (!nextVersion) {
          return;
        }
        if (currentViewerVersion === null) {
          currentViewerVersion = nextVersion;
          return;
        }
        if (nextVersion !== currentViewerVersion) {
          window.location.reload();
        }
      } catch (error) {
        // Ignore transient polling failures while the viewer server is restarting.
      }
    }

    function stepContextSignature(step) {
      const sections = step?.context?.sections || [];
      const lastSection = sections.length ? sections[sections.length - 1] : null;
      return {
        count: sections.length,
        lastLabel: lastSection?.label || "",
        lastLength: (lastSection?.content || "").length,
      };
    }

    function gameSignature(game) {
      if (!game) {
        return null;
      }
      const events = Array.isArray(game.events) ? game.events : [];
      const steps = Array.isArray(game.viewer_steps) ? game.viewer_steps : [];
      const eventCount = Number.isFinite(Number(game.eventCount))
        ? Number(game.eventCount)
        : events.length;
      const lastEvent = game.lastEvent || (events.length ? events[events.length - 1] : null);
      const lastStep = steps.length ? steps[steps.length - 1] : null;
      const lastStepContext = stepContextSignature(lastStep);
      return JSON.stringify({
        gameId: game.game_id || "",
        status: game.status || "",
        eventCount,
        stepCount: steps.length,
        serverStepCount: game.stepCount ?? null,
        stepsAreLazy: Boolean(game.stepsAreLazy),
        lastEventType: lastEvent?.type || "",
        lastEventStatus: lastEvent?.status || "",
        lastEventActionNum: lastEvent?.action_num ?? null,
        lastEventScore: lastEvent?.score ?? null,
        lastEventReward: lastEvent?.reward ?? null,
        lastEventTranscriptLength: lastEvent?.transcriptLength ?? ((lastEvent?.transcript || "").length),
        lastStepTitle: lastStep?.title || "",
        lastStepKind: lastStep?.stepKind || "",
        lastStepActionDisplay: lastStep?.actionDisplay || "",
        lastStepReward: lastStep?.reward ?? null,
        lastStepRange: lastStep?.stepRangeLabel || "",
        lastStepScore: lastStep?.score ?? null,
        lastStepState: lastStep?.state || "",
        lastStepLevel: lastStep?.level ?? null,
        lastStepContext,
      });
    }

    async function loadPayload(requestedRun = currentRunName, options = {}) {
      const {
        preserveSelection = false,
        silent = false,
      } = options;
      if (isLoadingPayload) {
        return;
      }

      const previousActiveStepIndex = activeStepIndex;

      isLoadingPayload = true;
      currentGameLoadToken += 1;
      if (!silent) {
        runSubtitleEl.textContent = requestedRun
          ? `Loading ${requestedRun}...`
          : "Loading latest run...";
      }
      try {
        const url = new URL("/api/run", window.location.origin);
        if (requestedRun) {
          url.searchParams.set("run", requestedRun);
        }
        const response = await fetch(url, { cache: "no-store" });
        const nextPayload = await response.json();
        payload = nextPayload;
        if (!response.ok) {
          throw new Error(payload.error || "Failed to load run payload");
        }
        currentRunName = payload.selected_run || null;
        currentGameIndex = Math.min(currentGameIndex, Math.max((payload.games?.length || 1) - 1, 0));
        renderHeader();
        await loadGameDetails(currentGameIndex, {
          preserveSelection,
          previousActiveStepIndex,
          silent,
        });
      } catch (error) {
        if (silent && payload) {
          return;
        }
        payload = null;
        currentRunName = null;
        currentSteps = [];
        currentGameSignature = null;
        expandedStepIndex = null;
        hoveredStepIndex = null;
        runSelectEl.innerHTML = "";
        gameSelectEl.innerHTML = "";
        eventCountEl.textContent = "";
        levelCountEl.textContent = "";
        levelsListEl.innerHTML = "";
        eventsListEl.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
        boardSummaryEl.innerHTML = "";
        runtimeUsageEl.innerHTML = "";
        clearBoard();
        asciiBoardEl.hidden = false;
        asciiBoardEl.textContent = "No run data available yet.\nRun `make run` first, then reload the viewer.";
      } finally {
        isLoadingPayload = false;
      }
    }

    async function loadGameDetails(gameIndex = currentGameIndex, options = {}) {
      const {
        preserveSelection = false,
        previousActiveStepIndex = activeStepIndex,
        silent = false,
      } = options;
      const game = payload?.games?.[gameIndex];
      if (!game) {
        renderGame({ preserveSelection, previousActiveStepIndex });
        return null;
      }

      if (Array.isArray(game.viewer_steps)) {
        const nextGameSignature = gameSignature(game);
        if (silent && currentGameSignature === nextGameSignature) {
          return game;
        }
        if (gameIndex === currentGameIndex) {
          renderGame({ preserveSelection, previousActiveStepIndex });
        }
        return game;
      }

      const requestToken = ++currentGameLoadToken;
      if (!silent && gameIndex === currentGameIndex) {
        eventCountEl.textContent = "";
        eventsListEl.innerHTML = '<div class="empty-state">Loading game data...</div>';
        boardSummaryEl.innerHTML = "";
        clearBoard();
        asciiBoardEl.hidden = false;
        asciiBoardEl.textContent = "Loading game data...";
      }

      try {
        const url = new URL("/api/game", window.location.origin);
        url.searchParams.set("index", String(gameIndex));
        if (currentRunName) {
          url.searchParams.set("run", currentRunName);
        }
        const response = await fetch(url, { cache: "no-store" });
        const detail = await response.json();
        if (!response.ok) {
          throw new Error(detail.error || "Failed to load game payload");
        }
        if (requestToken !== currentGameLoadToken) {
          return null;
        }
        payload.games[gameIndex] = { ...game, ...detail };
        const loadedGame = payload.games[gameIndex];
        const nextGameSignature = gameSignature(loadedGame);
        if (gameIndex === currentGameIndex && !(silent && currentGameSignature === nextGameSignature)) {
          renderGame({ preserveSelection, previousActiveStepIndex });
        }
        return loadedGame;
      } catch (error) {
        if (requestToken !== currentGameLoadToken) {
          return null;
        }
        if (gameIndex === currentGameIndex) {
          currentSteps = [];
          currentGameSignature = null;
          eventCountEl.textContent = "";
          levelCountEl.textContent = "0 levels";
          levelsListEl.innerHTML = '<div class="empty-state">No levels recorded.</div>';
          eventsListEl.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
          boardSummaryEl.innerHTML = "";
          runtimeUsageEl.innerHTML = "";
          clearBoard();
          asciiBoardEl.hidden = false;
          asciiBoardEl.textContent = "No game data available for this selection.";
        }
        return null;
      }
    }

    async function loadStepDetails(stepIndex) {
      const game = payload?.games?.[currentGameIndex];
      const step = currentSteps[stepIndex];
      if (!game || !step || !game.stepsAreLazy || step.detailLoaded || step.loadingDetail) {
        return step || null;
      }

      step.loadingDetail = true;
      syncStepCards(currentSteps);
      const requestToken = currentGameLoadToken;
      try {
        const url = new URL("/api/game-step", window.location.origin);
        url.searchParams.set("index", String(currentGameIndex));
        url.searchParams.set("step", String(stepIndex));
        if (currentRunName) {
          url.searchParams.set("run", currentRunName);
        }
        const response = await fetch(url, { cache: "no-store" });
        const detail = await response.json();
        if (!response.ok) {
          throw new Error(detail.error || "Failed to load step details");
        }
        if (requestToken !== currentGameLoadToken) {
          return null;
        }

        const hydratedStep = { ...step, ...(detail.step || {}), loadingDetail: false, detailLoaded: true };
        game.viewer_steps[stepIndex] = hydratedStep;
        currentSteps[stepIndex] = hydratedStep;
        syncStepCards(currentSteps);
        updateActiveStep(stepIndex, { force: true });
        return hydratedStep;
      } catch (error) {
        if (requestToken !== currentGameLoadToken) {
          return null;
        }
        step.loadingDetail = false;
        step.detailError = error.message;
        syncStepCards(currentSteps);
        return null;
      }
    }

    function renderHeader() {
      const gameCount = payload.games.length;
      const availableRuns = payload.available_runs || [];
      const runOptions = availableRuns.length
        ? availableRuns
        : (payload.selected_run ? [payload.selected_run] : []);
      const hasPassViews = payload.games.some((game) => game.pass_label != null && game.pass_label !== "");
      const hasSeedViews = !hasPassViews && payload.games.some((game) => game.seed_label != null && game.seed_label !== "");
      const gameCountLabel = hasPassViews
        ? `${gameCount} game/pass view${gameCount === 1 ? "" : "s"}`
        : hasSeedViews
          ? `${gameCount} game/seed view${gameCount === 1 ? "" : "s"}`
        : `${gameCount} game${gameCount === 1 ? "" : "s"}`;
      runSubtitleEl.textContent = `${payload.run_name} · ${gameCountLabel} · ${runOptions.length} run${runOptions.length === 1 ? "" : "s"} available`;
      runSelectEl.innerHTML = runOptions.map((runName) => (
        `<option value="${escapeHtml(runName)}">${escapeHtml(runName)}</option>`
      )).join("");
      if (payload.selected_run) {
        runSelectEl.value = payload.selected_run;
      }
      gameSelectEl.innerHTML = payload.games.map((game, index) => {
        const label = game.display_name || (
          game.pass_label != null && game.pass_label !== ""
            ? `${game.game_id || `Game ${index + 1}`} · pass ${game.pass_label}`
            : game.seed_label != null && game.seed_label !== ""
            ? `${game.game_id || `Game ${index + 1}`} · seed ${game.seed_label}`
            : (game.game_id || `Game ${index + 1}`)
        );
        return `<option value="${index}">${escapeHtml(label)}</option>`;
      }).join("");
      gameSelectEl.value = String(currentGameIndex);
    }

    function renderGame(options = {}) {
      const {
        preserveSelection = false,
        previousActiveStepIndex = activeStepIndex,
      } = options;
      const game = payload?.games?.[currentGameIndex];
      if (!game) {
        currentGameSignature = null;
        currentSteps = [];
        expandedStepIndex = null;
        hoveredStepIndex = null;
        eventsListEl.innerHTML = '<div class="empty-state">No game data found in this run.</div>';
        eventCountEl.textContent = "";
        levelsListEl.innerHTML = '<div class="empty-state">No levels recorded.</div>';
        levelCountEl.textContent = "0 levels";
        boardSummaryEl.innerHTML = "";
        runtimeUsageEl.innerHTML = "";
        clearBoard();
        return;
      }

      currentSteps = buildDisplaySteps(Array.isArray(game.viewer_steps) ? game.viewer_steps : []);
      if (!currentSteps.length) {
        currentGameSignature = gameSignature(game);
        expandedStepIndex = null;
        hoveredStepIndex = null;
        eventsListEl.innerHTML = '<div class="empty-state">No viewer steps recorded for this game yet.</div>';
        eventCountEl.textContent = "0 steps";
        levelsListEl.innerHTML = '<div class="empty-state">No levels recorded.</div>';
        levelCountEl.textContent = "0 levels";
        boardSummaryEl.innerHTML = "";
        runtimeUsageEl.innerHTML = "";
        clearBoard();
        return;
      }

      eventCountEl.textContent = `${currentSteps.length} step${currentSteps.length === 1 ? "" : "s"}`;
      renderLevelsSidebar(currentSteps);
      activeStepIndex = preserveSelection
        ? Math.min(Math.max(0, previousActiveStepIndex), currentSteps.length - 1)
        : Math.max(0, currentSteps.length - 1);
      expandedStepIndex = null;
      hoveredStepIndex = null;
      syncStepCards(currentSteps);
      currentScrollStepIndex = activeStepIndex;
      updateActiveStep(activeStepIndex, { force: true });
      currentGameSignature = gameSignature(game);
    }

    function renderStepCard(step, index) {
      const localSections = step.localContext?.sections || [];
      const rawSections = step.context?.sections || [];
      const { sections: visibleSections, hiddenPrefixCount } = localSections.length
        ? { sections: localSections, hiddenPrefixCount: 0 }
        : focusStepSections(rawSections);
      const previousStep = index > 0 ? currentSteps[index - 1] : null;
      const transformedSections = buildRenderedSections(visibleSections, previousStep);
      const hiddenNote = hiddenPrefixCount > 0
        ? `<div class="context-note">Earlier carried context is hidden here so this step starts with the current step context.</div>`
        : "";
      const sections = transformedSections.map((section) => renderSectionCard(section)).join("");

      const empty = !sections
        ? '<div class="context-empty">No captured agent context for this step.</div>'
        : "";
      const metaBits = [];
      if (step.batchSize > 1 && step.stepRangeLabel) {
        metaBits.push(step.stepRangeLabel);
      }
      if (step.actionDisplay) {
        metaBits.push(step.actionDisplay);
      }
      const meta = metaBits.length
        ? `<div class="event-meta">${escapeHtml(metaBits.join(" · "))}</div>`
        : "";
      const isExpanded = expandedStepIndex === index;
      const isLazy = Boolean(step.lazy && !step.detailLoaded);
      const hint = isExpanded
        ? ""
        : `<div class="event-hint">${isLazy ? "Click to load details" : "Click to expand"}</div>`;
      const lazyState = isLazy
        ? `<div class="context-empty">${escapeHtml(step.loadingDetail ? "Loading step details..." : (step.detailError || "Step details load when expanded."))}</div>`
        : "";
      const contextStack = isExpanded
        ? `
          <div class="context-stack">
            ${hiddenNote}
            ${sections}
            ${lazyState || empty}
          </div>
        `
        : "";

      return `
        <article class="event-card ${isExpanded ? "" : "collapsed"}" data-index="${index}">
          <div class="event-card-header">
            <h3 class="event-title">${escapeHtml(step.title)}</h3>
            ${meta}
            ${hint}
          </div>
          ${contextStack}
        </article>
      `;
    }

    function renderSectionCard(section) {
      const inContext = section.inContext !== false;
      const stateBits = [];
      if (section.metaLabel) {
        stateBits.push(`<span class="section-state">${escapeHtml(section.metaLabel)}</span>`);
      }
      if (!inContext) {
        stateBits.push('<span class="section-state">Not In Context</span>');
      }
      const stateLabel = stateBits.join("");
      const changeNote = section.changeNoteHtml
        ? `<div class="section-change-note">${section.changeNoteHtml}</div>`
        : (section.changeNote
          ? `<div class="section-change-note">${escapeHtml(section.changeNote)}</div>`
          : "");
      const content = section.contentHtml
        ? section.contentHtml
        : `<pre>${escapeHtml(section.content)}</pre>`;

      if (section.collapsed) {
        return `
          <details class="section-card ${escapeHtml(section.kind)} ${inContext ? "" : "not-in-context"}">
            <summary class="section-label section-summary">
              <span>${escapeHtml(section.label)}</span>
              ${stateLabel}
            </summary>
            ${changeNote}
            ${content}
          </details>
        `;
      }

      return `
        <div class="section-card ${escapeHtml(section.kind)} ${inContext ? "" : "not-in-context"}">
          <div class="section-label">
            <span>${escapeHtml(section.label)}</span>
            ${stateLabel}
          </div>
          ${changeNote}
          ${content}
        </div>
      `;
    }

    function renderLevelsSidebar(steps) {
      const levelGroups = buildLevelGroups(steps);
      levelCountEl.textContent = `${levelGroups.length} level${levelGroups.length === 1 ? "" : "s"}`;
      if (!levelGroups.length) {
        levelsListEl.innerHTML = '<div class="empty-state">No levels recorded.</div>';
        return;
      }

      levelsListEl.innerHTML = levelGroups.map((group) => `
        <button
          type="button"
          class="level-button"
          data-level-key="${escapeHtml(group.key)}"
          data-step-index="${group.stepIndex}"
        >
          <span class="level-title">${escapeHtml(group.label)}</span>
          <span class="level-meta">${escapeHtml(group.meta)}</span>
        </button>
      `).join("");
    }

    function buildLevelGroups(steps) {
      const groups = [];
      const seen = new Map();
      for (let index = 0; index < steps.length; index += 1) {
        const step = steps[index];
        const rawLevel = step?.level;
        if (rawLevel == null || rawLevel === "") {
          continue;
        }
        const key = String(rawLevel);
        if (seen.has(key)) {
          seen.get(key).count += 1;
          seen.get(key).lastStepIndex = index;
          continue;
        }
        const group = {
          key,
          label: `Level ${key}`,
          stepIndex: index,
          lastStepIndex: index,
          count: 1,
          meta: "",
        };
        seen.set(key, group);
        groups.push(group);
      }

      for (const group of groups) {
        const firstLabel = steps[group.stepIndex]?.title || `Step ${group.stepIndex + 1}`;
        const lastLabel = steps[group.lastStepIndex]?.title || firstLabel;
        group.meta = group.count === 1
          ? `Starts at ${firstLabel}`
          : `${group.count} steps, ${firstLabel} to ${lastLabel}`;
      }

      return groups;
    }

    function buildRenderedSections(sections, previousStep) {
      const previousSections = previousStep?.localContext?.sections?.length
        ? previousStep.localContext.sections
        : (previousStep?.context?.sections || []);
      const previousUserPrompt = findLastSectionContent(previousSections, "USER PROMPT");
      const previousSystemPrompt = findLastSectionContent(previousSections, "SYSTEM PROMPT");

      return (Array.isArray(sections) ? sections : []).map((section) => {
        const renderedSection = { ...section, collapsed: false, metaLabel: "", changeNote: "" };

        if (section?.label === "SYSTEM PROMPT") {
          renderedSection.collapsed = true;
          if (previousSystemPrompt && normalizeLines(previousSystemPrompt) === normalizeLines(section.content)) {
            renderedSection.metaLabel = "Unchanged";
          }
          return renderedSection;
        }

        if (section?.label === "USER PROMPT") {
          const diff = diffPromptLines(previousUserPrompt, section.content);
          renderedSection.content = diff.content;
          renderedSection.contentHtml = diff.contentHtml;
          renderedSection.metaLabel = diff.metaLabel;
          renderedSection.changeNote = diff.changeNote;
          renderedSection.changeNoteHtml = diff.changeNoteHtml;
          return renderedSection;
        }

        return renderedSection;
      });
    }

    function findLastSectionContent(sections, label) {
      if (!Array.isArray(sections)) {
        return "";
      }
      for (let index = sections.length - 1; index >= 0; index -= 1) {
        const section = sections[index];
        if (section?.label === label) {
          return String(section.content || "");
        }
      }
      return "";
    }

    function normalizeLines(content) {
      return String(content || "").replaceAll("\r\n", "\n").trimEnd();
    }

    function diffPromptLines(previousContent, currentContent) {
      const normalizedCurrent = normalizeLines(currentContent);
      if (!previousContent) {
        return {
          content: normalizedCurrent,
          contentHtml: renderPromptContent(normalizedCurrent, new Set()),
          metaLabel: "",
          changeNote: "",
          changeNoteHtml: "",
        };
      }

      const previousLines = normalizeLines(previousContent).split("\n");
      const currentLines = normalizedCurrent.split("\n");
      const changedLineIndexes = new Set();
      for (let index = 0; index < currentLines.length; index += 1) {
        if ((previousLines[index] || "") !== currentLines[index]) {
          changedLineIndexes.add(index);
        }
      }

      if (!changedLineIndexes.size) {
        return {
          content: normalizedCurrent,
          contentHtml: renderPromptContent(normalizedCurrent, changedLineIndexes),
          metaLabel: "Unchanged",
          changeNote: "",
          changeNoteHtml: "",
        };
      }

      return {
        content: normalizedCurrent,
        contentHtml: renderPromptContent(normalizedCurrent, changedLineIndexes),
        metaLabel: "Highlighted Changes",
        changeNote: `${changedLineIndexes.size} changed line${changedLineIndexes.size === 1 ? "" : "s"} highlighted in the full prompt.`,
        changeNoteHtml: renderPromptLegend(changedLineIndexes.size),
      };
    }

    function renderPromptContent(content, changedLineIndexes) {
      const lines = normalizeLines(content).split("\n");
      return `
        <div class="prompt-content">${lines.map((line, index) => (
          `<span class="prompt-line ${changedLineIndexes.has(index) ? "changed" : ""}">${escapeHtml(line || " ")}</span>`
        )).join("")}</div>
      `;
    }

    function renderPromptLegend(changedLineCount) {
      return `
        <div>${escapeHtml(`${changedLineCount} line${changedLineCount === 1 ? "" : "s"} changed from the previous user prompt.`)}</div>
        <div class="section-legend">
          <span class="legend-swatch" aria-hidden="true"></span>
          <span>Highlighted lines differ from the previous user prompt.</span>
        </div>
      `;
    }

    function buildDisplaySteps(steps) {
      if (!Array.isArray(steps) || !steps.length) {
        return [];
      }

      const [firstStep, ...rest] = steps;
      const firstStepLocalSections = firstStep?.localContext?.sections || [];
      const firstToolCallIndex = findIndex(
        firstStepLocalSections,
        (section) => typeof section?.label === "string" && section.label.startsWith("TOOL CALL:"),
      );
      if (firstToolCallIndex <= 0) {
        return steps;
      }

      const initialSections = firstStepLocalSections.slice(0, firstToolCallIndex);
      const stepOneSections = firstStepLocalSections.slice(firstToolCallIndex);
      if (!initialSections.length || !stepOneSections.length) {
        return steps;
      }

      return [
        {
          ...firstStep,
          title: "Initial",
          actionDisplay: null,
          stepRangeLabel: null,
          batchSize: 0,
          reward: null,
          localContext: { sections: initialSections },
          context: { sections: initialSections },
          stepKind: "initial",
        },
        {
          ...firstStep,
          localContext: { sections: stepOneSections },
        },
        ...rest,
      ];
    }

    function focusStepSections(sections) {
      if (!Array.isArray(sections) || sections.length === 0) {
        return { sections: [], hiddenPrefixCount: 0 };
      }

      const latestUserPromptIndex = findLastIndex(
        sections,
        (section) => section?.label === "USER PROMPT",
      );
      if (latestUserPromptIndex <= 0) {
        return { sections, hiddenPrefixCount: 0 };
      }

      const precedingToolCallIndex = findLastIndex(
        sections.slice(0, latestUserPromptIndex),
        (section) => typeof section?.label === "string" && section.label.startsWith("TOOL CALL:"),
      );
      if (precedingToolCallIndex < 0) {
        return { sections, hiddenPrefixCount: 0 };
      }

      return {
        sections: sections.slice(precedingToolCallIndex),
        hiddenPrefixCount: precedingToolCallIndex,
      };
    }

    function findLastIndex(items, predicate) {
      for (let index = items.length - 1; index >= 0; index -= 1) {
        if (predicate(items[index], index)) {
          return index;
        }
      }
      return -1;
    }

    function findIndex(items, predicate) {
      for (let index = 0; index < items.length; index += 1) {
        if (predicate(items[index], index)) {
          return index;
        }
      }
      return -1;
    }

    function createStepCardElement(step, index) {
      const template = document.createElement("template");
      template.innerHTML = renderStepCard(step, index).trim();
      return template.content.firstElementChild;
    }

    function syncStepCards(steps) {
      const existingCards = [...eventsListEl.querySelectorAll(".event-card")];
      const hasOnlyCards = existingCards.length === eventsListEl.children.length;
      if (!hasOnlyCards) {
        eventsListEl.innerHTML = "";
      }

      let cards = hasOnlyCards ? existingCards : [];
      for (let index = 0; index < steps.length; index += 1) {
        const nextCard = createStepCardElement(steps[index], index);
        const existingCard = cards[index];
        if (!existingCard) {
          eventsListEl.appendChild(nextCard);
          continue;
        }

        const comparableExisting = existingCard.cloneNode(true);
        comparableExisting.classList.remove("active");
        if (comparableExisting.outerHTML !== nextCard.outerHTML) {
          existingCard.replaceWith(nextCard);
          cards[index] = nextCard;
        }
      }

      cards = [...eventsListEl.querySelectorAll(".event-card")];
      for (let index = cards.length - 1; index >= steps.length; index -= 1) {
        cards[index].remove();
      }
    }

    function updateExpandedStep(index) {
      if (expandedStepIndex === index) {
        expandedStepIndex = null;
      } else {
        expandedStepIndex = index;
      }
      syncStepCards(currentSteps);
      [...eventsListEl.querySelectorAll(".event-card")].forEach((card) => {
        card.classList.toggle("active", Number(card.dataset.index) === activeStepIndex);
      });
    }

    function scrollStepCardToStart(index) {
      const card = eventsListEl.querySelector(`.event-card[data-index="${index}"]`);
      if (!card) {
        return;
      }
      const listRect = eventsListEl.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const nextScrollTop = eventsListEl.scrollTop + cardRect.top - listRect.top;
      eventsListEl.scrollTop = Math.max(0, nextScrollTop);
      currentScrollStepIndex = index;
    }
    function updateActiveStep(index, options = {}) {
      const { force = false } = options;
      const step = currentSteps[index];
      if (!step) {
        return;
      }

      if (!force && activeStepIndex === index) {
        return;
      }

      activeStepIndex = index;
      currentScrollStepIndex = index;
      [...eventsListEl.querySelectorAll(".event-card")].forEach((card) => {
        const cardIndex = Number(card.dataset.index);
        card.classList.toggle("active", cardIndex === index);
        card.classList.toggle("preview", cardIndex === hoveredStepIndex);
      });
      const activeLevelKey = step.level == null || step.level === "" ? null : String(step.level);
      [...levelsListEl.querySelectorAll(".level-button")].forEach((button) => {
        button.classList.toggle("active", button.dataset.levelKey === activeLevelKey);
      });

      const game = payload?.games?.[currentGameIndex];
      if (game) {
        renderCurrentDisplayedStep(game);
      }
    }

    function getDisplayedStepIndex() {
      return hoveredStepIndex != null ? hoveredStepIndex : activeStepIndex;
    }

    function renderCurrentDisplayedStep(game = payload?.games?.[currentGameIndex]) {
      if (!game) {
        return;
      }
      const step = currentSteps[getDisplayedStepIndex()];
      if (!step) {
        return;
      }
      renderBoardPanel(game, step);
    }

    function updateHoveredStep(index) {
      if (hoveredStepIndex === index) {
        return;
      }
      hoveredStepIndex = index;
      [...eventsListEl.querySelectorAll(".event-card")].forEach((card) => {
        card.classList.toggle("preview", Number(card.dataset.index) === hoveredStepIndex);
      });
      renderCurrentDisplayedStep();
    }

    function syncActiveStepToScroll() {
      const cards = [...eventsListEl.querySelectorAll(".event-card")];
      if (!cards.length) {
        return;
      }

      const listRect = eventsListEl.getBoundingClientRect();

      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        if (rect.bottom <= listRect.top) {
          continue;
        }
        const index = Number(card.dataset.index);
        if (index !== currentScrollStepIndex) {
          updateActiveStep(index);
        }
        return;
      }
    }

    function renderBoardPanel(game, step) {
      const event = step.boardEvent || step.event;
      const replay = game.replay_url
        ? `<a class="summary-link" href="${escapeHtml(game.replay_url)}" target="_blank" rel="noreferrer">Replay</a>`
        : "";
      const carriesPriorSequence = step.stepKind === "turn" || step.stepKind === "result";
      const rewardValue = step.reward != null
        ? step.reward
        : (carriesPriorSequence ? null : event.reward);
      const stepType = step.stepKind === "turn"
        ? "turn"
        : (step.stepKind === "result"
          ? "result"
          : (step.stepKind === "batch" ? "batch" : (event.type || "event")));
      const actionLabelText = carriesPriorSequence
        ? (step.batchSize > 1 ? "Previous actions" : "Previous action")
        : (step.batchSize > 1 ? "Actions" : "Action");
      const actionValue = step.actionDisplay
        || (carriesPriorSequence ? "—" : (event.action_display || event.action_name || "No action"));
      const stepSummary = step.batchSize > 1 && step.stepRangeLabel
        ? renderSummaryItem(carriesPriorSequence ? "Previous steps" : "Steps", step.stepRangeLabel.replace(/^Steps?\s+/, ""))
        : "";
      const stateValue = step.stateTransition || step.state || event.state || "—";
      boardSummaryEl.innerHTML = `
        <div class="summary-header">
          <div>
            <h2>${escapeHtml(step.title)}</h2>
            <div class="summary-subtitle">${escapeHtml(stepType)} · ${escapeHtml(game.status || "UNKNOWN")}</div>
          </div>
          ${replay}
        </div>
        <div class="summary-grid">
          ${renderSummaryItem(actionLabelText, actionValue)}
          ${renderSummaryItem("Reward", rewardValue != null ? formatSigned(rewardValue) : "—")}
          ${renderSummaryItem("Score", step.score != null ? formatNumber(step.score) : (event.score != null ? formatNumber(event.score) : "—"))}
          ${renderSummaryItem("State", stateValue)}
          ${renderSummaryItem("Level", step.level != null ? String(step.level) : (event.level != null ? String(event.level) : "—"))}
          ${stepSummary}
        </div>
      `;
      runtimeUsageEl.innerHTML = renderToolUsageSummary(game);

      renderBoard(event);
    }

    function renderToolUsageSummary(game) {
      const usage = Array.isArray(game?.runtimeSymbolUsage) ? game.runtimeSymbolUsage : [];
      const total = Number(game?.runtimeSymbolUseCount || 0);
      if (!usage.length) {
        return `
          <div class="tool-usage-block">
            <div class="tool-usage-header">
              <div class="tool-usage-title">Runtime Symbol Usage</div>
              <div class="tool-usage-total">${escapeHtml(String(total))} total</div>
            </div>
            <div class="tool-usage-list">
              <div class="tool-usage-row">
                <span class="tool-usage-rank">-</span>
                <span class="tool-usage-name">No runtime symbol usage recorded.</span>
                <span class="tool-usage-count">0</span>
              </div>
            </div>
          </div>
        `;
      }
      return `
        <div class="tool-usage-block">
          <div class="tool-usage-header">
            <div class="tool-usage-title">Runtime Symbol Usage</div>
            <div class="tool-usage-total">${escapeHtml(String(total))} total</div>
          </div>
          <div class="tool-usage-list">
            ${usage.map((item, index) => `
              <div class="tool-usage-row">
                <span class="tool-usage-rank">${index + 1}.</span>
                <span class="tool-usage-name">${escapeHtml(item.name || "unknown")}</span>
                <span class="tool-usage-count">${escapeHtml(String(item.count || 0))}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderSummaryItem(label, value, extraClass = "") {
      return `
        <div class="summary-item ${escapeHtml(extraClass)}">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(String(value))}</span>
        </div>
      `;
    }

    function formatSigned(value) {
      const num = Number(value);
      if (Number.isNaN(num)) {
        return "—";
      }
      return `${num > 0 ? "+" : ""}${num}`;
    }

    function renderBoard(event) {
      const board = Array.isArray(event.board) && event.board.length ? event.board : null;
      if (board) {
        asciiBoardEl.hidden = true;
        canvasEl.hidden = false;
        drawBoard(board);
        return;
      }

      clearBoard();
      const ascii = event.board_ascii || "No board snapshot recorded for this step.";
      asciiBoardEl.hidden = false;
      asciiBoardEl.textContent = ascii;
    }

    function clearBoard() {
      canvasEl.hidden = true;
      const ctx = canvasEl.getContext("2d");
      ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    }

    function drawBoard(board) {
      const rows = board.length;
      const cols = Math.max(1, ...board.map((row) => row.length));
      const boardWrap = canvasEl.parentElement.getBoundingClientRect();
      const availableWidth = Math.max(1, boardWrap.width - 16);
      const availableHeight = Math.max(1, boardWrap.height - 16);
      const cellSize = Math.max(1, Math.floor(Math.min(availableWidth / cols, availableHeight / rows)));
      const width = cols * cellSize;
      const height = rows * cellSize;
      const palette = payload?.arc_palette?.length ? payload.arc_palette : DEFAULT_ARC_PALETTE;

      canvasEl.width = width;
      canvasEl.height = height;
      canvasEl.style.width = `${width}px`;
      canvasEl.style.height = `${height}px`;

      const ctx = canvasEl.getContext("2d");
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = palette[0] || "#ffffff";
      ctx.fillRect(0, 0, width, height);

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const value = Number(board[row][col] ?? 0);
          ctx.fillStyle = palette[Math.max(0, Math.min(palette.length - 1, value))];
          ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
          ctx.strokeStyle = "rgba(255,255,255,0.08)";
          ctx.strokeRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }

      canvasEl.hidden = false;
      asciiBoardEl.hidden = true;
    }

    function formatNumber(value) {
      const num = Number(value);
      if (Number.isInteger(num)) {
        return String(num);
      }
      return num.toFixed(2);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadPayload();
    pollViewerVersion();
    window.setInterval(pollViewerVersion, 1000);
  </script>
</body>
</html>
